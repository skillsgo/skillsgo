# [INPUT]: Depends on local Hub runtime defaults and environment-variable overrides.
# [OUTPUT]: Provides the complete development configuration for the SkillsGo Hub.
# [POS]: Serves as the maintained local runtime configuration in the Hub workspace.
# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md
# This is an example configuration with all supported properties explicitly set
# Most properties can be overridden with environment variables specified in this file
# Most properties also have defaults (mentioned in this file) if they are not set in either the config file or the corresponding environment variable

# If you put this file where the Hub starts as "skillsgo-hub.toml", it is loaded automatically.
# You can also pass -config_file with an explicit path.

# Environment specifies the type of environment to run.
# Supported values are: 'development' and 'production'. Defaults to "development"
# Env override: SKILLSGO_HUB_ENVIRONMENT
Environment = "development"

# Mode defaults to selfhost. Cloud mode requires CloudOrigin.
# Env overrides: SKILLSGO_HUB_MODE and SKILLSGO_HUB_CLOUD_ORIGIN
Mode = "selfhost"
CloudOrigin = ""

# SkillCacheDir stores persistent Git Repository mirrors and temporary publication snapshots.
# If empty, Hub uses ~/.skillsgo/hub/cache.
# Override priority:
# 1. SKILLSGO_HUB_CACHE_DIR
# 2. this value
# 3. SKILLSGO_HUB_HOME/cache
# 4. SKILLSGO_HOME/hub/cache
# 5. ~/.skillsgo/hub/cache
SkillCacheDir = ""

# RepositoryCacheTTL is the idle lifetime, in seconds, of persistent Git mirrors.
# Set to 0 to disable age-based cleanup.
# Env override: SKILLSGO_HUB_REPOSITORY_CACHE_TTL
RepositoryCacheTTL = 604800

# RepositoryCacheMaxBytes is the aggregate Git mirror cache quota. When exceeded,
# inactive mirrors are removed from least recently used to most recently used.
# Set to 0 to disable quota-based cleanup.
# Env override: SKILLSGO_HUB_REPOSITORY_CACHE_MAX_BYTES
RepositoryCacheMaxBytes = 10737418240

# LogLevel returns the system's exposure to internal logs. Defaults to debug.
# Supports all logrus log levels (https://github.com/Sirupsen/logrus#level-logging)
# Env override: SKILLSGO_HUB_LOG_LEVEL
LogLevel = "debug"

# LogFormat determines the format that logs are output in. Defaults to json.
# It is only used when CloudRuntime is set to none. Values can be "plain" or "json".
# Env override: SKILLSGO_HUB_LOG_FORMAT
LogFormat = "plain"

# CloudRuntime is the Cloud Provider on which the Proxy/Hub is running.
# Currently available options are "GCP", or "none". Defaults to "none"
# Env override: SKILLSGO_HUB_CLOUD_RUNTIME
CloudRuntime = "none"

# EnablePprof specifies if the pprof endpoints should be exposed.
# Note that this option is not meant to be activated forever on a server
# and should be desactivated once not needed.
EnablePprof = false

# PprofPort specifies the port on which pprof will be exposed if activated.
PprofPort = ":3001"

# The filename for the include exclude filter.
# Env override: SKILLSGO_HUB_FILTER_FILE
FilterFile = ""

# The filename for the robots.txt.
# ENV override: SKILLSGO_HUB_ROBOTS_FILE
#
# To provide /robots.txt for net crawler.
# Default disallow all crawler.
# Content details to see https://support.google.com/webmasters/answer/6062608
RobotsFile = "robots.txt"

# Timeout is the timeout for external network calls in seconds
# This value is used as the default for storage backends if they don't specify timeouts
# Defaults to 300
# Env override: SKILLSGO_HUB_TIMEOUT
Timeout = 300

# StorageType sets the type of storage backend the proxy will use.
# Possible values are memory, disk, mongo, gcp, s3, azureblob, external
# Defaults to disk at ~/.skillsgo/hub/storage/artifacts when no config file is supplied
# Env override: SKILLSGO_HUB_STORAGE_TYPE
StorageType = "disk"

# Certificate and key to make athens serve using https instead of plain text http.
# Set both to enable.
# Env override: SKILLSGO_HUB_TLSCERT_FILE, SKILLSGO_HUB_TLSKEY_FILE
#TLSCertFile = "server.cer"
#TLSKeyFile = "server.key"

# Port sets the port the proxy listens on
# Env override: SKILLSGO_HUB_PORT
# The value must be a number or a number prefixed by ":"
Port = ":3000"

# UnixSocket sets a Unix domain socket path that the proxy listens on.
# This option, when specified, takes precedence over TCP port configuration.
# Defaults to empty (i.e. listen on a TCP port only)
# Env override: SKILLSGO_HUB_UNIX_SOCKET
UnixSocket = ""

# BASIC AUTH OPTIONS
# ==================
# PLASE NOTE THAT THIS IS A BAD HACK AROUND
# THE FACT THAT GO DOES NOT SUPPORT PROPER AUTHENTICATION
# YET! YOUR BASIC AUTH CREDENTIALS CAN EASILY LEAK
# IN ATHENS LOGS AS WELL AS GO COMMAND LOGS.
# THIS WILL BE ADDRESSED IN 1.13.
# SEE https://github.com/golang/go/issues/30610

# Username for basic auth
# Env override: SKILLSGO_HUB_BASIC_AUTH_USER
BasicAuthUser = ""

# Password for basic auth
# Env override: SKILLSGO_HUB_BASIC_AUTH_PASS
BasicAuthPass = ""

# Optional Basic Auth credentials scoped to /api/v1/admin/** when global Basic Auth is disabled.
# Env override: SKILLSGO_HUB_ADMIN_AUTH_USER
AdminAuthUser = ""

# Env override: SKILLSGO_HUB_ADMIN_AUTH_PASS
AdminAuthPass = ""

# A path on disk to a Go HTML template to be used on the homepage
# Env override: SKILLSGO_HUB_HOME_TEMPLATE_PATH
HomeTemplatePath = "/var/lib/skillsgo/home.html"

# Set to true to force an SSL redirect
# Env override: SKILLSGO_HUB_FORCE_SSL
ForceSSL = false

# ValidatorHook specifies the endpoint to validate modules against
# Not used if left blank or not specified
# Env override: SKILLSGO_HUB_PROXY_VALIDATOR
ValidatorHook = ""

# PathPrefix specifies whether the Proxy
# should have a basepath. Certain proxies and services
# are distinguished based on subdomain, while others are based
# on path prefixes.
# Env override: SKILLSGO_HUB_PATH_PREFIX
PathPrefix = ""

# GithubTokens configures a sticky failover pool for GitHub metadata API
# requests only. Artifact publication never uses these credentials.
# Env override: SKILLSGO_HUB_GITHUB_TOKENS (comma, semicolon, or newline-delimited)
GithubTokens = []

# Tracing is not a requirement for Athens. If the infrastructure is not set up,
# Athens will keep on running and traces won't be exported.
# TraceExporter selects how Athens exports OpenTelemetry traces.
# The only supported value is "otlp"; an empty value disables tracing.
# Env override: SKILLSGO_HUB_TRACE_EXPORTER
TraceExporter = ""

# TraceExporterURL is the OTLP collector endpoint Athens exports traces to.
# When empty, the standard OTEL_EXPORTER_OTLP_ENDPOINT / OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
# environment variables are honored (defaulting to localhost:4317).
# Env override: SKILLSGO_HUB_TRACE_EXPORTER_URL
TraceExporterURL = "http://localhost:4317"

# TraceSamplingFraction is the fraction of root traces to sample, from 0.0 (none) to
# 1.0 (all). It only applies outside of development; in development every trace is
# sampled. Child spans always follow their parent's sampling decision.
# Env override: SKILLSGO_HUB_TRACE_SAMPLING_FRACTION
TraceSamplingFraction = 1.0

# Stats is not a requirement for Athens. If the value is not set,
# Athens will keep on running and stats won't be collected.
# Possible values are: prometheus.
# Env override: SKILLSGO_HUB_STATS_EXPORTER
StatsExporter = "prometheus"

# NetworkMode configures how Athens will return the results
# of the /list endpoint as it can be assembled from both its own
# storage and the upstream VCS.
# 
# Note, that for better error messaging, this would also affect how other
# endpoints behave.
# 
# Modes:
# 1. strict: merge VCS versions with storage versions, but fail if either of them fails.
# 2. offline: only get storage versions, never reach out to VCS.
# 3. fallback: only return storage versions, if VCS fails. Note this means that you may
# see inconsistent results since fallback mode does a best effort of giving you what's
# available at the time of requesting versions.
NetworkMode = "strict"

# ArtifactOrigin optionally redirects immutable Repository ZIP responses after publication.
# Info and list responses always remain on the Hub origin.
# Env override: SKILLSGO_HUB_ARTIFACT_ORIGIN
ArtifactOrigin = ""

# Database stores searchable Skill metadata. Artifact archives remain in Storage.
# SQLite uses ~/.skillsgo/hub/metadata/hub.db when DSN is empty.
[Database]
    Type = "sqlite"
    DSN = ""
    MaxOpenConns = 1
    MaxIdleConns = 1
    ConnMaxLifetime = 0

# River partitions this total worker budget across source (60%), default (20%),
# and maintenance (20%) queues when Database.Type is postgres. The minimum is 3.
# SQLite local development executes tasks synchronously without durable retries.
# Env override: SKILLSGO_HUB_TASK_QUEUE_MAX_WORKERS
[TaskQueue]
    MaxWorkers = 10

# Optional OpenAI-compatible LLM used only for Repository and Skill description translation.
# An empty APIKey disables the worker. For local development, prefer the
# SKILLSGO_HUB_LLM_API_KEY environment variable instead of storing a secret here.
[LLM]
    BaseURL = "https://api.deepseek.com"
    APIKey = ""
    Model = "deepseek-v4-flash"
    TranslationLocales = ["zh-Hans"]
    TranslationInterval = 900
    TranslationBatch = 100
    PromptVersion = "description-v1"

# ShutdownTimeout sets the timeout (in seconds) for open connections when shutting down
# (via SIGINT or SIGTERM). Connections still open after the timeout will be dropped.
# Defaults to 60
# Env override: SKILLSGO_HUB_SHUTDOWN_TIMEOUT
ShutdownTimeout = 60

[Storage]
    # Only storage backends that are specified in Proxy.StorageType are required here
    [Storage.CDN]
        # Endpoint for CDN storage
        # Env override: CDN_ENDPOINT
        Endpoint = "cdn.example.com"

    [Storage.Disk]
        # Empty uses ~/.skillsgo/hub/storage/artifacts (or the configured
        # SKILLSGO_HOME / SKILLSGO_HUB_HOME directory).
        # Env override: SKILLSGO_HUB_DISK_STORAGE_ROOT
        RootPath = ""

    [Storage.GCP]
        # Required IAM Roles (https://cloud.google.com/storage/docs/access-control/iam-roles):
        # - roles/storage.objectCreator
        # - roles/storage.objectViewer
        # - roles/storage.legacyBucketReader

        # ProjectID to use for GCP Storage
        # Env override: GOOGLE_CLOUD_PROJECT
        ProjectID = "MY_GCP_PROJECT_ID"

        # Bucket to use for GCP Storage
        # Env override: SKILLSGO_HUB_STORAGE_GCP_BUCKET
        Bucket = "MY_GCP_BUCKET"

        # JSONKey is a base64 encoded service account 
        # key that allows Athens to be run outside of GCP
        # but still be able to access GCS. This is not needed
        # when relying on default GCP authentication with 
        # GOOGLE_APPLICATION_CREDENTIALS variable set up. 
        # See https://cloud.google.com/docs/authentication/getting-started.
        #
        # Env override: SKILLSGO_HUB_STORAGE_GCP_JSON_KEY
        JSONKey = ""

    [Storage.Minio]
        # Endpoint for Minio storage
        # Env override: SKILLSGO_HUB_MINIO_ENDPOINT
        Endpoint = "127.0.0.1:9001"

        # Access Key for Minio storage
        # Env override: SKILLSGO_HUB_MINIO_ACCESS_KEY_ID
        Key = "minio"

        # Secret Key for Minio storage
        # Env override: SKILLSGO_HUB_MINIO_SECRET_ACCESS_KEY
        Secret = "minio123"

        # Enable SSL for Minio connections
        # Defaults to true
        # Env override: SKILLSGO_HUB_MINIO_USE_SSL
        EnableSSL = false

        # Minio Bucket to use for storage
        # Defaults to gomods
        # Env override: SKILLSGO_HUB_MINIO_BUCKET_NAME
        Bucket = "gomods"

        # Region for Minio storage
        # Env override: SKILLSGO_HUB_MINIO_REGION
        Region = ""

    [Storage.Mongo]
        # Full connection string for mongo storage
        # Env override: SKILLSGO_HUB_MONGO_STORAGE_URL
        URL = "mongodb://127.0.0.1:27017"

        # Sets default database name for mongo storage if not set by URL
        # Env override: SKILLSGO_HUB_MONGO_DEFAULT_DATABASE
        DefaultDBName = "athens"

        # Path to certificate to use for the mongo connection
        # Env override: SKILLSGO_HUB_MONGO_CERT_PATH
        CertPath = ""

        # Allows for insecure SSL / http connections to mongo storage
        # Should be used for testing or development only
        # Env override: SKILLSGO_HUB_MONGO_INSECURE
        Insecure = false

    [Storage.S3]
        ### The authentication model is as below for S3 in the following order
        ### If AWS_CREDENTIALS_ENDPOINT is specified and it returns valid results, then it is used
        ### If config variables are specified and they are valid, then they return valid results, then it is used
        ### Otherwise, it will default to default configurations which is as follows
        # attempt to find credentials in the environment, in the shared
        # configuration (~/.aws/credentials) and from ec2 instance role
        # credentials. See
        # https://godoc.org/github.com/aws/aws-sdk-go#hdr-Configuring_Credentials
        # and
        # https://godoc.org/github.com/aws/aws-sdk-go/aws/session#hdr-Environment_Variables
        # for environment variables that will affect the aws configuration.
        # Setting UseDefaultConfiguration would only use default configuration. It will be deprecated in future releases
        # and is recommended not to use it.

        # Region for S3 storage
        # Env override: AWS_REGION
        Region = "MY_AWS_REGION"

        # Access Key for S3 storage
        # Env override: AWS_ACCESS_KEY_ID
        Key = "MY_AWS_ACCESS_KEY_ID"

        # Secret Key for S3 storage
        # Env override: AWS_SECRET_ACCESS_KEY
        Secret = "MY_AWS_SECRET_ACCESS_KEY"

        # Session Token for S3 storage
        # Env override: AWS_SESSION_TOKEN
        Token = ""

        # S3 Bucket to use for storage
        # Env override: SKILLSGO_HUB_S3_BUCKET_NAME
        Bucket = "MY_S3_BUCKET_NAME"

        # If true then path style url for s3 endpoint will be used
        # Env override: AWS_FORCE_PATH_STYLE
        ForcePathStyle = false

        # If true then the default aws configuration will be used. This will
        # attempt to find credentials in the environment, in the shared
        # configuration (~/.aws/credentials) and from ec2 instance role
        # credentials. See
        # https://godoc.org/github.com/aws/aws-sdk-go#hdr-Configuring_Credentials
        # and
        # https://godoc.org/github.com/aws/aws-sdk-go/aws/session#hdr-Environment_Variables
        # for environment variables that will affect the aws configuration.
        UseDefaultConfiguration = false

        # https://docs.aws.amazon.com/sdk-for-go/api/aws/credentials/endpointcreds/
        CredentialsEndpoint = ""

        # conainer relative url (used by fargate) /v2/....
        # If this is present, it will concatenate to CredentialsEndpoint
        # If you are planning to use AWS Fargate, please use http://169.254.170.2 for CredentialsEndpoint
        # Ref: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task-metadata-endpoint-v2.html
        AwsContainerCredentialsRelativeURI = ""

        # An optional endpoint URL (hostname only or fully qualified URI)
        # that overrides the default generated endpoint for S3 storage client.
        #
        # You must still provide a `Region` value when specifying an endpoint.
        # Env override: AWS_ENDPOINT
        Endpoint = ""

   [Storage.AzureBlob]
        # Storage Account name for Azure Blob
        # Env override: SKILLSGO_HUB_AZURE_ACCOUNT_NAME
        AccountName = "MY_AZURE_BLOB_ACCOUNT_NAME"

        # Account Key to use with the storage account
        # Env override: SKILLSGO_HUB_AZURE_ACCOUNT_KEY
        AccountKey = ""

        # Managed Identity Resource Id to use with the storage account
        # Env override: SKILLSGO_HUB_AZURE_MANAGED_IDENTITY_RESOURCE_ID
        ManagedIdentityResourceId = ""

        # Storage Resource to use with the storage account
        # Env override: SKILLSGO_HUB_AZURE_CREDENTIAL_SCOPE
        CredentialScope = ""

        # Name of container in the blob storage
        # Env override: SKILLSGO_HUB_AZURE_CONTAINER_NAME
        ContainerName = "MY_AZURE_BLOB_CONTAINER_NAME"

   [Storage.External]
        # URL is the external storage URL that Athens 
        # will use to interact with the backend storage layer.
        # See https://docs.gomods.io/configuration/storage for implementation 
        # details.
        # Env override: SKILLSGO_HUB_EXTERNAL_STORAGE_URL
        URL = ""

[Index]
    [Index.MySQL]
        # MySQL protocol
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_PROTOCOL
        Protocol = "tcp"

        # MySQL user name
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_HOST
        Host = "localhost"

        # MySQL user name
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_PORT
        Port = 3306

        # MySQL user name
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_USER
        User = "root"

        # MySQL user name
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_PASSWORD
        Password = ""

        # MySQL database
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_DATABASE
        Database = "athens"

        # MySQL query parameters
        # Environment overrides must be in the following format:
        # SKILLSGO_HUB_INDEX_MYSQL_PARAMS="parseTime:true,timeout=90s"
        # Env override: SKILLSGO_HUB_INDEX_MYSQL_PARAMS
        [Index.MySQL.Params]
            parseTime = "true"
            timeout = "30s"
    [Index.Postgres]
        # Postgres user name
        # Env override: SKILLSGO_HUB_INDEX_POSTGRES_HOST
        Host = "localhost"

        # Postgres user name
        # Env override: SKILLSGO_HUB_INDEX_POSTGRES_PORT
        Port = 5432

        # Postgres user name
        # Env override: SKILLSGO_HUB_INDEX_POSTGRES_USER
        User = "postgres"

        # Postgres user name
        # Env override: SKILLSGO_HUB_INDEX_POSTGRES_PASSWORD
        Password = ""

        # Postgres database
        # Env override: SKILLSGO_HUB_INDEX_POSTGRES_DATABASE
        Database = "athens"

        # Postgres query parameters
        # Environment overrides must be in the following format:
        # SKILLSGO_HUB_INDEX_POSTGRES_PARAMS="connect_timeout:30s,sslmode=disable"
        # Env override: SKILLSGO_HUB_INDEX_POSTGRES_PARAMS
        [Index.Postgres.Params]
            connect_timeout = "30s"
            sslmode = "disable"

# Optional skills.sh all-time counter ingestion through the Vercel bridge.
