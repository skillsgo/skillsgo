# [INPUT]: Depends on the build, deployment, or runtime values declared in dependabot.yml.\n# [OUTPUT]: Provides the SkillsGo Hub or monorepo configuration defined by dependabot.yml.\n# [POS]: Serves as maintained configuration in the renamed SkillsGo Hub workspace or its repository integration.\n# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md\n---
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: update-go-pkg
      include: scope
    open-pull-requests-limit: 2
    target-branch: main
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: update-github-action
      include: scope
    open-pull-requests-limit: 2
    target-branch: main
  - package-ecosystem: docker
    directories:
      - /cmd/skillsgo-hub
    schedule:
      interval: weekly
    commit-message:
      prefix: update-docker-image
      include: scope
    open-pull-requests-limit: 2
    target-branch: main
