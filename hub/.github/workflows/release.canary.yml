# [INPUT]: Depends on the build, deployment, or runtime values declared in release.canary.yml.\n# [OUTPUT]: Provides the SkillsGo Hub or monorepo configuration defined by release.canary.yml.\n# [POS]: Serves as maintained configuration in the renamed SkillsGo Hub workspace or its repository integration.\n# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md\nname: Release canary

on:
  push:
    branches:
      - main

jobs:
  docker-push-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push images
        uses: docker/build-push-action@v7
        with:
          file: cmd/skillsgo-hub/Dockerfile
          build-args: VERSION=${{ github.sha }}
          tags: gomods/athens:canary,gomods/athens-dev:${{ steps.vars.outputs.sha_short }}
          push: true
          platforms: linux/amd64,linux/arm64
