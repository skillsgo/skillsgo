# [INPUT]: Depends on Air, the Hub Makefile build target, config.dev.toml, and maintained Go source files.
# [OUTPUT]: Rebuilds and restarts the local Hub when its source or development configuration changes.
# [POS]: Serves as the Hub-owned hot-reload configuration used by the root development topology.
# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md

root = "."
tmp_dir = "tmp/air"
env_files = [".env.local"]

[build]
cmd = "make build"
entrypoint = ["./bin/skillsgo-hub", "-config_file=./config.dev.toml"]
include_ext = ["go", "toml"]
exclude_dir = ["bin", "dist", "docs", "testdata", "tmp", "vendor"]
exclude_regex = ["_test.go$"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[misc]
clean_on_exit = true
startup_banner = "SkillsGo Hub hot reload"
