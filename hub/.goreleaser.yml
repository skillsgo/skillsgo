# [INPUT]: Depends on the build, deployment, or runtime values declared in .goreleaser.yml.\n# [OUTPUT]: Provides the SkillsGo Hub or monorepo configuration defined by .goreleaser.yml.\n# [POS]: Serves as maintained configuration in the renamed SkillsGo Hub workspace or its repository integration.\n# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md\nversion: 2
project_name: skillsgo-hub

before:
  hooks:
    - go mod download
env:
- CGO_ENABLED=0
- GOPROXY=https://proxy.golang.org

builds:
- id: builds
  goos:
    - linux
    - darwin
  goarch:
    - amd64
    - arm64
  main: cmd/hub/main.go
  binary: skillsgo-hub
  ldflags:
    - -X "github.com/skillsgo/skillsgo/hub/pkg/build.version={{ .Tag }}"
    - -X "github.com/skillsgo/skillsgo/hub/pkg/build.buildDate={{ .Env.DATE }}"

checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
    - '^docs:'
    - '^test:'
