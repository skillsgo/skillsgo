# [INPUT]: Depends on a successful main-branch Continuous Integration run, the Protocol-aware Hub Dockerfile, GHCR, and GitHub-native package credentials.
# [OUTPUT]: Publishes public linux/amd64 Hub snapshot images for validated main commits with OCI provenance and SBOM metadata.
# [POS]: Serves as the gated open-source continuous container delivery workflow consumed by Railway.
# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md
name: Hub Container Snapshot

on:
  workflow_run:
    workflows: [Continuous Integration]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hub-container-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Publish GHCR image
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Resolve validated source
        id: source
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SOURCE_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Checkout validated source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/skillsgo/hub
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ steps.source.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=SkillsGo Hub
            org.opencontainers.image.description=Open-source discovery and artifact service for SkillsGo
            org.opencontainers.image.source=https://github.com/skillsgo/skillsgo
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}

      - name: Build and publish
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: hub/cmd/skillsgo-hub/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=sha-${{ steps.source.outputs.short_sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest published image
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ghcr.io/skillsgo/hub
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
