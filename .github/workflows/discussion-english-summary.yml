# [INPUT]: Depends on newly created GitHub Discussions, GitHub Models inference, and the repository-owned summary script.
# [OUTPUT]: Adds a clearly labeled English translation and summary comment to non-English Discussion opening posts.
# [POS]: Serves as the multilingual community bridge while preserving the author's original Discussion content.
# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md

name: Discussion English Summary

on:
  discussion:
    types: [created]

concurrency:
  group: discussion-english-summary-${{ github.event.discussion.number }}
  cancel-in-progress: false

permissions:
  contents: read
  discussions: write
  models: read

jobs:
  summarize:
    if: github.event.discussion.user.type != 'Bot'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository automation
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Add English summary when needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/discussion-english-summary.mjs
