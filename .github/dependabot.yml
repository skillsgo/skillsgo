# [INPUT]: Depends on the build, deployment, or runtime values declared in dependabot.yml.\n# [OUTPUT]: Provides the SkillsGo Hub or monorepo configuration defined by dependabot.yml.\n# [POS]: Serves as maintained configuration in the renamed SkillsGo Hub workspace or its repository integration.\n# [PROTOCOL]: Update this header when this file changes, then review AGENTS.md\nversion: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /hub
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly

  - package-ecosystem: pub
    directory: /app
    schedule:
      interval: weekly
